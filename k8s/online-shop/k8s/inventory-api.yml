apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-api-config
  namespace: online-shop
data:
  POSTGRES_HOST: postgres.online-shop-bd.svc.cluster.local
  POSTGRES_PORT: "5432"
  POSTGRES_DB: shop
  POSTGRES_USER: shop
---
apiVersion: v1
kind: Secret
metadata:
  name: inventory-api-secret
  namespace: online-shop
type: Opaque
stringData:
  POSTGRES_PASSWORD: shop
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-api
  namespace: online-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: inventory-api
  template:
    metadata:
      labels:
        app: inventory-api
    spec:
      containers:
        - name: inventory-api
          image: 192.168.0.8:30082/cilium-shop/inventory-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: inventory-api-config
            - secretRef:
                name: inventory-api-secret
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: inventory-api
  namespace: online-shop
spec:
  selector:
    app: inventory-api
  ports:
    - name: http
      port: 8080
      targetPort: http
