apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: online-shop-bd
type: Opaque
stringData:
  POSTGRES_PASSWORD: super-secret-password
  papapeva: getmybodie
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-config
  namespace: online-shop-bd
data:
  POSTGRES_DB: online_shop
  POSTGRES_USER: online_shop_user
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: online-shop-bd
spec:
  clusterIP: None
  selector:
    app: online-shop-postgres
  ports:
    - name: postgres
      port: 5432
      targetPort: postgres
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: online-shop-bd
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: online-shop-postgres
  template:
    metadata:
      labels:
        app: online-shop-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - configMapRef:
                name: postgres-config
            - secretRef:
                name: postgres-secret
          env:
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: local-path
        resources:
          requests:
            storage: 5Gi
