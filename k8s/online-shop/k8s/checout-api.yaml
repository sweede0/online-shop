apiVersion: v1
kind: Namespace
metadata:
  name: online-shop
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: checkout-api-config
  namespace: online-shop
data:
  PAYMENT_API: http://payment-api.online-shop.svc.cluster.local:8080
  INVENTORY_API: http://inventory-api.online-shop.svc.cluster.local:8080
  NOTIFICATION_API: http://notification-api.online-shop.svc.cluster.local:8080
  REDIS_HOST: redis-online-shop-service.online-shop-bd.svc.cluster.local
  REDIS_PORT: "6379"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: checkout-api
  namespace: online-shop
spec:
  replicas: 2
  selector:
    matchLabels:
      app: checkout-api
  template:
    metadata:
      labels:
        app: checkout-api
    spec:
      containers:
        - name: checkout-api
          image: 192.168.0.8:30082/checkout-api:1.0.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          envFrom:
            - configMapRef:
                name: checkout-api-config
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: checkout-api
  namespace: online-shop
spec:
  selector:
    app: checkout-api
  ports:
    - name: http
      port: 8080
      targetPort: http
